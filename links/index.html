<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Aperture · Links</title>
<link rel="icon" type="image/png" href="../assets/aperture-eye-cyan.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; overflow-x: hidden; max-width: 100%; }
  body {
    font-family: 'JetBrains Mono', 'VT323', monospace;
    background: #050a0e;
    color: #cfe8ec;
    min-height: 100vh;
    position: relative;
  }
  ::selection { background: #29c5d6; color: #050a0e; }
  ::-webkit-scrollbar { width: 12px; }
  ::-webkit-scrollbar-track { background: #050a0e; }
  ::-webkit-scrollbar-thumb { background: #157a87; border: 2px solid #050a0e; }

  @keyframes blink { 0%,49% { opacity:1; } 50%,100% { opacity:0; } }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
  @keyframes glow { 0%,100% { text-shadow:0 0 6px rgba(41,197,214,0.2); } 50% { text-shadow:0 0 14px rgba(41,197,214,0.55); } }
  @keyframes rowIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }
  @keyframes ringPulse {
    0%,100% { box-shadow: 0 0 14px rgba(41,197,214,0.45); }
    50%     { box-shadow: 0 0 30px rgba(41,197,214,0.8); }
  }
  @keyframes waPulse {
    0%,100% { box-shadow: 5px 5px 0 rgba(0,0,0,0.55), 0 0 16px rgba(79,214,160,0.35); }
    50%     { box-shadow: 5px 5px 0 rgba(0,0,0,0.55), 0 0 34px rgba(79,214,160,0.7); }
  }

  .wrap {
    position: relative;
    z-index: 2;
    max-width: 620px;
    margin: 0 auto;
    padding: 56px 20px 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
  }

  .prompt {
    font-size: 15px;
    color: #1f8fa0;
    margin-bottom: 26px;
    animation: rowIn .4s ease both;
  }
  .prompt .cmd { color: #cfe8ec; }
  .cursor {
    display: inline-block; width: 8px; height: 14px;
    background: #29c5d6; margin-left: 5px; vertical-align: -2px;
    animation: blink 1.1s steps(1) infinite;
  }

  .avatar {
    width: 158px; height: 158px; border-radius: 50%;
    border: 3px solid #29c5d6; background: #050a0e;
    display: grid; place-items: center;
    animation: bob 4.6s ease-in-out infinite, ringPulse 3.2s ease-in-out infinite;
  }
  .avatar img { width: 112px; height: 112px; object-fit: contain; }

  h1 {
    font-family: 'Press Start 2P', monospace;
    font-size: clamp(14px, 4vw, 19px);
    color: #29c5d6;
    margin: 26px 0 0;
    animation: glow 4s ease-in-out infinite;
  }
  .tag {
    font-family: 'VT323', monospace;
    font-size: 24px;
    color: #7fa2ac;
    margin: 14px 0 0;
    line-height: 1.35;
  }

  /* fila de iconos pequeños (redes) */
  .icons {
    display: flex;
    gap: 13px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 30px;
  }
  .ic {
    --ac: #33c9d6;
    --gl: rgba(51,201,214,0.32);
    width: 54px; height: 54px;
    display: grid; place-items: center;
    text-decoration: none;
    background: #0a1622;
    border: 2px solid var(--ac);
    color: var(--ac);
    font-weight: 700; font-size: 16px;
    box-shadow: 4px 4px 0 rgba(0,0,0,0.55);
    transition: transform .15s ease, box-shadow .15s ease;
    animation: rowIn .45s ease both;
  }
  .ic:hover, .ic:focus-visible {
    transform: translateY(-3px);
    box-shadow: 4px 7px 0 rgba(0,0,0,0.55), 0 0 18px var(--gl);
    outline: none;
  }
  .ic svg { width: 25px; height: 25px; display: block; }
  .glyph svg { width: 19px; height: 19px; display: block; }
  .ic:nth-child(1) { animation-delay: .10s; }
  .ic:nth-child(2) { animation-delay: .16s; }
  .ic:nth-child(3) { animation-delay: .22s; }
  .ic:nth-child(4) { animation-delay: .28s; }

  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 34px;
  }

  .ln {
    --ac: #33c9d6;
    --gl: rgba(51,201,214,0.32);
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    background: #0a1622;
    border: 2px solid var(--ac);
    padding: 15px 18px;
    box-shadow: 5px 5px 0 rgba(0,0,0,0.55);
    transition: transform .15s ease, box-shadow .15s ease;
    animation: rowIn .45s ease both;
  }
  .ln:hover, .ln:focus-visible {
    transform: translateY(-3px);
    box-shadow: 5px 8px 0 rgba(0,0,0,0.55), 0 0 22px var(--gl);
    outline: none;
  }
  .ln .glyph {
    flex: 0 0 auto;
    min-width: 46px; height: 40px;
    display: grid; place-items: center;
    border: 1px solid var(--ac);
    color: var(--ac);
    font-weight: 700; font-size: 15px;
    background: #050a0e;
    padding: 0 8px;
  }
  .ln .txt { flex: 1; text-align: left; min-width: 0; }
  .ln .label {
    display: block;
    color: var(--ac);
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 0.4px;
  }
  .ln .handle {
    display: block;
    color: #7fa2ac;
    font-size: 13px;
    margin-top: 2px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .ln .go { flex: 0 0 auto; color: var(--ac); font-weight: 700; font-size: 15px; }

  /* WhatsApp destacado */
  .ln.featured {
    background: #4fd6a0;
    border-color: #4fd6a0;
    animation: rowIn .45s ease both, waPulse 2.6s ease-in-out infinite;
  }
  .ln.featured .glyph { background: #043326; border-color: #043326; color: #4fd6a0; }
  .ln.featured .label { color: #043326; font-size: 17px; }
  .ln.featured .handle { color: #0b5c46; }
  .ln.featured .go { color: #043326; }
  .ln.featured:hover, .ln.featured:focus-visible {
    transform: translateY(-3px);
    box-shadow: 5px 8px 0 rgba(0,0,0,0.55), 0 0 34px rgba(79,214,160,0.75);
  }

  .ln:nth-child(1) { animation-delay: .36s; }
  .ln:nth-child(2) { animation-delay: .44s; }
  .ln:nth-child(3) { animation-delay: .52s; }

  footer {
    margin-top: 44px;
    font-size: 13px;
    color: #5c7a86;
    animation: rowIn .5s ease both;
    animation-delay: .64s;
  }
  footer .out { color: #1f8fa0; }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
  }

  @media (max-width: 420px) {
    .wrap { padding: 40px 14px 40px; }
    .tag { font-size: 20px; }
    .ln { padding: 13px 14px; gap: 11px; }
    .ln .label { font-size: 15px; }
    .ln .handle { font-size: 12px; }
  }
</style>

<script>
  // Matrix rain (versión compacta para esta página)
  (function () {
    var canvas = document.getElementById('matrixRain');
    var ctx = canvas.getContext('2d');
    var chars = '01アイウエオカキクケコ<>/{}[]$#λΣπ';
    var fontSize = 15, drops = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      var cols = Math.floor(canvas.width / fontSize);
      drops = [];
      for (var i = 0; i < cols; i++) drops.push(Math.random() * -60);
    }
    resize();
    window.addEventListener('resize', resize);

    setInterval(function () {
      ctx.fillStyle = 'rgba(5,10,14,0.12)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = fontSize + 'px monospace';
      for (var i = 0; i < drops.length; i++) {
        ctx.fillStyle = Math.random() > 0.96 ? '#9ff2fb' : '#29c5d6';
        var ch = chars.charAt(Math.floor(Math.random() * chars.length));
        ctx.fillText(ch, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }, 66);
  })();
</script>
